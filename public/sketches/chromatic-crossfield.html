<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    body {
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }
    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    const numDesigns = 75;
    let crossDesigns = [];

    class CrossDesign {
      constructor(offset, hue) {
        this.pos = createVector(offset, 0);
        this.vel = createVector(random(-1, 1), random(-1, 1));
        this.hue = hue;
        this.timeOffset = random(1000);
      }

      update() {
        this.timeOffset += 0.05;
        this.pos.add(this.vel);

        if (this.pos.x < -windowWidth / 2 || this.pos.x > windowWidth / 2) {
          this.vel.x *= -1;
        }
        if (this.pos.y < -windowHeight / 2 || this.pos.y > windowHeight / 2) {
          this.vel.y *= -1;
        }
      }

      draw() {
        const dynamicStroke = map(noise(this.timeOffset), 0, 1, 1, 5);
        strokeWeight(dynamicStroke);
        stroke(this.hue, 100, 100);

        line(this.pos.x, this.pos.y, this.pos.x + windowWidth, this.pos.y + windowHeight);
        line(this.pos.x, this.pos.y + windowHeight, this.pos.x + windowWidth, this.pos.y);
      }
    }

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB);
      frameRate(5);
      initDesigns();
    }

    function initDesigns() {
      crossDesigns = [];
      for (let i = 0; i < numDesigns; i++) {
        const offset = map(i, 0, numDesigns, -windowWidth / 2, windowWidth / 2);
        const hue = map(i, 0, numDesigns, 0, 360);
        crossDesigns.push(new CrossDesign(offset, hue));
      }
    }

    function draw() {
      background(0);
      translate(width / 2, height / 2);

      crossDesigns.forEach((design) => {
        design.update();
        design.draw();
      });

      drawRandomSquares();
    }

    function drawRandomSquares() {
      const numSquares = int(random(10, 100));
      noFill();
      for (let i = 0; i < numSquares; i++) {
        stroke(i % 2 === 0 ? color(0, 0, 0) : color(random(0, 360), 100, 100));
        strokeWeight(random(1, 10));

        const x = random(-width / 2, width / 2);
        const y = random(-height / 2, height / 2);
        const squareSize = random(10, 225);
        rect(x, y, squareSize, squareSize);
      }
    }

    function mousePressed() {
      if (isLooping()) {
        noLoop();
      } else {
        loop();
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      initDesigns();
    }
  </script>
</body>
</html>
