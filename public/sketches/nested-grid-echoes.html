<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #141414;
    }
    body {
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }
    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    let cells = [];
    let staticLayer;
    const generationInterval = 5000;
    const cols = 6;
    const rows = 4;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      frameRate(30);
      initializeScene();
    }

    function initializeScene() {
      staticLayer = createGraphics(windowWidth, windowHeight);
      staticLayer.pixelDensity(1);
      staticLayer.clear();
      cells = [];

      const cellW = width / cols;
      const cellH = height / rows;

      for (let i = 0; i < cols; i++) {
        for (let j = 0; j < rows; j++) {
          cells.push({
            x: i * cellW,
            y: j * cellH,
            w: cellW,
            h: cellH,
            xOffset: random(-10, 10),
            yOffset: random(-10, 10),
            xSpeed: random(-1, 1),
            ySpeed: random(-1, 1),
            depth: 0,
            lastGenTime: millis()
          });
        }
      }
    }

    function draw() {
      background(0, 30);

      for (let cell of cells) {
        cell.xOffset += cell.xSpeed;
        cell.yOffset += cell.ySpeed;

        if (cell.xOffset < -20 || cell.xOffset > 20) cell.xSpeed *= -1;
        if (cell.yOffset < -20 || cell.yOffset > 20) cell.ySpeed *= -1;

        push();
          noFill();
          stroke(255);
          strokeWeight(2);
          rect(cell.x + cell.xOffset, cell.y + cell.yOffset, cell.w, cell.h);
        pop();

        if (millis() - cell.lastGenTime > generationInterval) {
          cell.depth++;
          cell.lastGenTime = millis();
          drawNestedShape(staticLayer, cell.x + cell.xOffset, cell.y + cell.yOffset, cell.w, cell.h, cell.depth);
        }
      }

      image(staticLayer, 0, 0);
    }

    function drawNestedShape(g, x, y, w, h, depth) {
      if (depth <= 0) return;

      g.push();
        g.translate(x + w / 2, y + h / 2);
        const angle = random(-PI / 4, PI / 4);
        g.rotate(angle);
        const col = color(random(255), random(255), random(255), 200);
        g.fill(col);
        g.noStroke();
        g.rectMode(CENTER);
        const newW = w * 0.8;
        const newH = h * 0.8;
        g.rect(0, 0, newW, newH);
      g.pop();

      drawNestedShape(g, x + (w - newW) / 2, y + (h - newH) / 2, newW, newH, depth - 1);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      initializeScene();
    }
  </script>
</body>
</html>
