<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    body {
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }
    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script>
    let crossDesigns = [];
    let timeOffsets = [];
    const numDesigns = 100;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 1);
      strokeCap(SQUARE);
      initializeDesigns();
    }

    function initializeDesigns() {
      crossDesigns = [];
      timeOffsets = [];

      for (let i = 0; i < numDesigns; i++) {
        const xOffset = map(i, 0, numDesigns, -windowWidth / 2, windowWidth / 2);
        const hue = map(i, 0, numDesigns, 0, 360);

        crossDesigns.push({
          x1: 0,
          y1: 0,
          x2: windowWidth,
          y2: windowHeight,
          x3: 0,
          y3: windowHeight,
          x4: windowWidth,
          y4: 0,
          xOffset,
          yOffset: 0,
          xSpeed: random(-1, 1),
          ySpeed: random(-1, 1),
          hue,
        });

        timeOffsets.push(random(1000));
      }
    }

    function draw() {
      background(0);
      translate(width / 2, height / 2);

      for (let i = 0; i < crossDesigns.length; i++) {
        const design = crossDesigns[i];
        timeOffsets[i] += 0.01;

        const dynamicStroke = map(noise(timeOffsets[i]), 0, 1, 1, 10);
        strokeWeight(dynamicStroke);
        stroke(design.hue, 100, 100);

        line(
          design.x1 + design.xOffset,
          design.y1 + design.yOffset,
          design.x2 + design.xOffset,
          design.y2 + design.yOffset
        );
        line(
          design.x3 + design.xOffset,
          design.y3 + design.yOffset,
          design.x4 + design.xOffset,
          design.y4 + design.yOffset
        );

        design.xOffset += design.xSpeed;
        design.yOffset += design.ySpeed;

        if (design.xOffset < -windowWidth / 2 || design.xOffset > windowWidth / 2) {
          design.xSpeed *= -1;
        }

        if (design.yOffset < -windowHeight / 2 || design.yOffset > windowHeight / 2) {
          design.ySpeed *= -1;
        }
      }
    }

    function mousePressed() {
      if (isLooping()) {
        noLoop();
      } else {
        loop();
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      initializeDesigns();
    }
  </script>
</body>
</html>
